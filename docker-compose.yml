services:

 postgres:
   build: image/Postgres
   restart: always
   ports:
    - "5432:5432"
   volumes:
    - ./docker/db/data-volume:/var/lib/postgresql/data
    - ./postgres/init:/docker-entrypoint-initdb.d
   environment:
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "postgres"
    POSTGRES_DB: postgres
 app:
  build:
    context: .
    dockerfile: image/Java/Dockerfile
  ports:
    - "8080:8080"
  volumes:
    - ./brApp/demo:/app
