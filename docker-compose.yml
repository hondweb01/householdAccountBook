services:
  postgres:
   container_name: postgresDB
   build: ./image
   restart: always
   ports:
    - "5432:5432"
   volumes:
    - ./docker/db/data-volume:/var/lib/postgres/data
    - ./postgres/init:/docker-entrypoint-initdb.d
   environment:
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "postgres"
    POSTGRES_DB: postgres
   